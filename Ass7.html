<!DOCTYPE html>
<html>
<head>
    <title>DOM Text Change Example</title>

    <script>
        function showText() {
            document.getElementById("text").innerHTML =
            "Hello! This text is changed using JavaScript DOM.";
        }
    </script>

</head>

<body style="text-align:center; font-family:Arial;">

    <h1>JavaScript DOM Demo</h1>

    <p id="text">Press the button to change this text.</p>

    <button onclick="showText()">Show Message</button>

</body>
</html>
